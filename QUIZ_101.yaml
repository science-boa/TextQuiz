  text: Explain the relationship between DNA, genes, and proteins, and describe how
    mapping the entire human genome is beneficial to modern medicine and science.
  points: 6
  rubric: "Level 1 (1-2 marks): Simple statements showing a basic understanding of\
    \ DNA, genes, or the genome, with little or no logical structure.\nLevel 2 (3-4\
    \ marks): Clear descriptions of how genes relate to proteins, or some clear benefits\
    \ of mapping the human genome, with some logical scientific linkages.\nLevel 3\
    \ (5-6 marks): Detailed, structured, and logical scientific explanation linking\
    \ DNA, genes, and proteins, alongside a comprehensive discussion of the medical\
    \ and scientific benefits of mapping the human genome.\n\nIndicative Content:\n\
    - DNA is a double-helix polymer made of two strands.\n- A gene is a small section\
    \ of DNA on a chromosome.\n- Each gene codes for a specific sequence of amino\
    \ acids to make a specific protein.\n- The genome is the entire genetic material\
    \ of an organism.\n- Benefits of mapping the genome:\n  1. Searching for genes\
    \ linked to different types of disease (e.g., cancer, Alzheimer's).\n  2. Understanding\
    \ and treating inherited disorders (e.g., cystic fibrosis).\n  3. Tracing human\
    \ migration patterns from the past to understand ancestry."
