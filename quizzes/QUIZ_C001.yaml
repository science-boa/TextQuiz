- question_num: 7
  text: What does DNA stand for?
  A: Deoxyribonucleic acid
  B: Dynamic nucleic acid
  C: Detailed nuclear analysis
  D: Defined nucleic acid
  answer: A
  points: 1
  explanation: The text explicitly defines DNA as deoxyribonucleic acid.
- question_num: 8
  text: What is the purpose of the Human Genome Project mentioned in the text?
  A: To build new hospitals
  B: To gain a better understanding of how traits are passed from parents to children
  C: To train nurses in surgery
  D: To reduce NHS waiting times
  answer: B
  points: 1
  explanation: The text states the project aims to gain a better understanding of
    how certain traits and characteristics are passed on from parents to children.
