title: Introduction to Careers in Genomics and Genomic Counselling
resource_text: "### Careers in Genomics and Genomic Counselling\n\nGenomics is the\
  \ study of genes and how alterations in them can affect the body. Genes act as instructions\
  \ that tell the body how to make the proteins required to survive and grow. Healthcare\
  \ scientists in genomics examine samples of a patient's nucleic acid—DNA or RNA—to\
  \ identify alterations responsible for inherited or acquired conditions, such as\
  \ cancer or cystic fibrosis. \n\n#### The Role of a Genomic Scientist\nWorking in\
  \ genomics involves the chemical examination of cellular DNA to define genetic abnormalities.\
  \ A scientist’s work generally falls into three categories: prenatal diagnosis (examining\
  \ foetal cells for anomalies), carrier testing and risk assessment for single gene\
  \ disorders, and confirming diagnoses for inherited or acquired conditions. While\
  \ these scientists rarely have direct patient contact, their research and examinations\
  \ have a profound impact on patient care. They work within multidisciplinary teams\
  \ alongside doctors, bioinformatics specialists, and genomic counsellors.\n\n####\
  \ The Role of a Genomic Counsellor\nGenomic counsellors (also known as genetic counsellors)\
  \ are highly skilled professionals who work directly with patients and their families.\
  \ They provide genetic information and support to help individuals adapt to genetic\
  \ diseases. A typical day for a counsellor involves recording medical histories,\
  \ ordering and interpreting tests, assessing inheritance risks, and communicating\
  \ the significance of conditions to patients. They must be able to translate complex\
  \ test results for patients and non-genetic health professionals, while considering\
  \ cultural, linguistic, and ethical issues. This role is highly collaborative, often\
  \ involving work with cancer, neurology, and cardiology teams.\n\n#### Skills and\
  \ Entry Requirements\nTo succeed in these fields, professionals need excellent communication\
  \ skills, emotional resilience, and the ability to work under pressure. Problem-solving,\
  \ diagnostic skills, and effective decision-making are also essential.\n\nEntry\
  \ routes vary based on experience and qualifications:\n- **Entry-level/Level 2 Apprenticeships:**\
  \ Typically require GCSEs (9-4/A-C) in maths, English, and science.\n- **Level 4\
  \ Apprenticeships:** Require 5 GCSEs (9-4/A-C) or a Level 2 Diploma in Healthcare\
  \ Science.\n- **Level 6 Apprenticeships/Degrees:** Require level 3 qualifications,\
  \ such as 3 A-levels (including one science) or an Access to HE course.\n- **Scientist\
  \ Training Programme (STP):** Requires a 1st or 2:1 in a relevant degree, or a 2:2\
  \ in any subject if holding a relevant higher degree. To become a genomic counsellor,\
  \ one must complete the NHS Scientist Training Programme.\n\n#### Pay and Benefits\n\
  Most NHS roles are covered by the Agenda for Change (AfC) pay system, which has\
  \ nine bands. Salaries vary significantly based on the role and level of responsibility.\
  \ For example, a Clinical Genomics Consultant can earn between £94,356 and £150,569,\
  \ while a Specialist Counsellor might earn between £39,959 and £48,117. Other roles,\
  \ such as a Band 5 Counsellor, may have a salary of £31,049. Benefits of working\
  \ in the NHS include flexible working, high income potential early in your career,\
  \ an excellent pension scheme, good holiday entitlement, and NHS discounts. \n\n\
  As you gain experience, you can progress into management, research, or teaching.\
  \ The field is expanding, and professionals often work at the forefront of innovation,\
  \ such as the Human Genome Project, which aims to understand how traits are passed\
  \ from parents to children."
multiple_choice:
- question_num: 1
  text: What is the primary focus of genomics?
  A: The study of how cells divide
  B: The study of genes and how alterations affect protein production
  C: The study of surgical techniques
  D: The study of hospital management
  answer: B
  points: 1
  explanation: The text states that genomics is the study of genes and how alterations
    can lead to changes in how proteins function or are produced.
- question_num: 2
  text: Which of these is a primary category of work for a healthcare scientist in
    genomics?
  A: Performing surgery on patients
  B: Prescribing medication for common colds
  C: Prenatal diagnosis
  D: Managing hospital budgets
  answer: C
  points: 1
  explanation: The text identifies prenatal diagnosis as one of the three main categories
    of work for a healthcare scientist in genomics.
- question_num: 3
  text: What is the main difference between a genomic scientist and a genomic counsellor
    regarding patient contact?
  A: Scientists have more patient contact than counsellors
  B: Counsellors rarely have direct patient contact
  C: Scientists rarely have direct patient contact, while counsellors work directly
    with patients
  D: Both roles have no patient contact
  answer: C
  points: 1
  explanation: The text notes that genomic scientists rarely have direct patient contact,
    whereas genomic counsellors work directly with patients and their families.
- question_num: 4
  text: What is a required qualification for the Scientist Training Programme (STP)?
  A: A 1st or 2:1 in a relevant degree
  B: Only a GCSE in science
  C: Ten years of work experience
  D: A medical degree only
  answer: A
  points: 1
  explanation: The text states that to start the STP, you need a 1st or 2:1 in a relevant
    first degree or a relevant higher degree.
- question_num: 5
  text: Which of the following is a skill required for a genomic counsellor?
  A: Advanced surgical skills
  B: Emotional resilience
  C: Financial accounting
  D: Heavy machinery operation
  answer: B
  points: 1
  explanation: The text lists emotional resilience, a calm temperament, and the ability
    to work under pressure as must-have skills for genomic counsellors.
