title: Introduction to Genomic Counselling and Healthcare Science
resource_text: "### Understanding Genomic Counselling and Genomics\n\nGenomics is\
  \ the study of genes and how alterations in them can change how proteins are produced\
  \ or function within the body. Genes act as instructions for the body to make the\
  \ proteins necessary for survival and growth. DNA, or deoxyribonucleic acid, is\
  \ the hereditary material found in almost every cell of the human body. Healthcare\
  \ scientists working in genomics examine samples of DNA or RNA to identify alterations\
  \ that may be responsible for inherited or acquired diseases, such as cancer or\
  \ cystic fibrosis.\n\n#### The Role of a Genomic Counsellor\nGenomic counsellors,\
  \ also known as genetic counsellors, are highly skilled healthcare professionals\
  \ who combine specific training in genetics and genomics with excellent communication\
  \ and counselling skills. Unlike healthcare scientists in genomics who often work\
  \ in laboratories and have limited direct patient contact, genomic counsellors work\
  \ directly with patients and their families. Their primary goal is to provide genetic\
  \ information and emotional support to help individuals adapt to genetic diseases\
  \ and conditions.\n\n#### Daily Responsibilities\nA typical day for a genomic counsellor\
  \ is patient-focused and highly collaborative. They work within multidisciplinary\
  \ teams—including cancer, neurology, and cardiology specialists—to provide expert\
  \ advice. Key activities include:\n- Recording detailed patient and family medical\
  \ histories.\n- Ordering and interpreting genetic and genomic tests.\n- Assessing\
  \ the risk of inheriting or passing on a medical condition.\n- Communicating the\
  \ significance of test results to patients and their families.\n- Using counselling\
  \ skills to address cultural, linguistic, and ethical issues.\n- Teaching other\
  \ health professionals and participating in clinical or psychosocial research.\n\
  \n#### Career Path and Requirements\nTo become a genomic counsellor, one must typically\
  \ complete the NHS Scientist Training Programme (STP). This requires a relevant\
  \ science degree, or a degree in psychology, nursing, or midwifery supplemented\
  \ by a short course in genetics. Essential skills for the role include emotional\
  \ resilience, a calm temperament, excellent communication, and strong problem-solving\
  \ abilities.\n\n#### Pay and Benefits\nNHS staff are generally employed under the\
  \ 'Agenda for Change' (AfC) pay system, which consists of nine pay bands. Genomic\
  \ counsellors and healthcare scientists can progress through these bands based on\
  \ their role and level of responsibility. Beyond salary, the NHS offers benefits\
  \ such as flexible working, an excellent pension scheme, good holiday entitlement,\
  \ and various discounts. \n\nAs the field of genetics continues to expand—highlighted\
  \ by projects like the Human Genome Project—the demand for skilled professionals\
  \ grows. Whether working in a laboratory or as a counsellor, these roles offer the\
  \ opportunity to make a significant difference in the quality of life for patients\
  \ and their families by helping them understand their genetic health and make informed\
  \ decisions."
multiple_choice:
- question_num: 1
  text: What is the primary function of genes according to the text?
  A: To store energy for the cell
  B: To act as instructions for making proteins
  C: To repair damaged cellular membranes
  D: To regulate body temperature
  answer: B
  points: 1
  explanation: The text states that genes are instructions which tell the body how
    to make all the proteins it needs to survive and grow.
- question_num: 2
  text: Which of these is a core responsibility of a genomic counsellor?
  A: Performing surgery on newborns
  B: Managing hospital finances
  C: Ordering and interpreting genetic tests
  D: Manufacturing pharmaceutical drugs
  answer: C
  points: 1
  explanation: The text lists ordering and interpreting genetic and genomic tests
    as a typical activity for a genomic counsellor.
- question_num: 3
  text: What is the main difference between a genomic counsellor and a healthcare
    scientist in genomics?
  A: Scientists have more patient contact
  B: Counsellors work only in laboratories
  C: Counsellors work directly with patients
  D: Scientists do not use DNA samples
  answer: C
  points: 1
  explanation: The text notes that genomic counsellors work directly with patients,
    whereas healthcare scientists in genomics rarely have direct patient contact.
