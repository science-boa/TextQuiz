  B: Only healthcare scientists in genomics work in the NHS
  C: Genomic counsellors have direct patient contact, while healthcare scientists
    in genomics rarely do
  D: Healthcare scientists in genomics do not require a degree
  answer: C
  points: 1
  explanation: The text notes that genomic counsellors work directly with patients,
    whereas healthcare scientists in genomics rarely have direct patient contact.
