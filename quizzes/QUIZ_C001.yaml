title: Introduction to Careers in Genomics and Genomic Counselling
resource_text: "### Careers in Genomics and Genomic Counselling\n\nGenomics is the\
  \ study of genes and how alterations in DNA or RNA can impact health, potentially\
  \ leading to inherited or acquired conditions like cancer or cystic fibrosis. Healthcare\
  \ scientists in this field examine nucleic acid samples to identify these alterations\
  \ and predict the likelihood of them being passed to future generations. Their work\
  \ typically involves prenatal diagnosis, carrier testing, and confirming diagnoses.\
  \ While these scientists rarely have direct patient contact, their research is vital\
  \ to clinical decision-making.\n\nIn contrast, genomic counsellors (also known as\
  \ genetic counsellors) work directly with patients and their families. They are\
  \ highly skilled professionals who combine expertise in genetics with advanced communication\
  \ and counselling skills. Their role is patient-focused and includes recording medical\
  \ histories, ordering and interpreting genetic tests, and helping families understand\
  \ the implications of genetic conditions. They provide emotional support, helping\
  \ individuals adapt to life-changing news, such as a diagnosis during pregnancy.\n\
  \n#### Working in the NHS\nMost roles in the NHS are covered by the 'Agenda for\
  \ Change' (AfC) pay system, which consists of nine pay bands. Salaries vary based\
  \ on the specific role and level of responsibility. For example, a Healthcare science\
  \ assistant typically falls into bands B2/B3, while a Healthcare science practitioner\
  \ starts at band B5. Qualified clinical scientists generally begin at band 7, with\
  \ opportunities to progress to band 9 with further training and experience. \n\n\
  #### Entry and Skills\nTo become a genomic counsellor, one must complete the NHS\
  \ Scientist Training Programme (STP) with a relevant science degree, or via nursing,\
  \ midwifery, or psychology with a short course in genetics. Essential skills for\
  \ these roles include emotional resilience, problem-solving, excellent communication,\
  \ and the ability to work within multidisciplinary teams. \n\nBenefits of working\
  \ in the NHS include flexible working, high income potential early in a career,\
  \ an excellent pension scheme, and good holiday entitlement. As the field of genetics\
  \ continues to expand—highlighted by projects like the Human Genome Project—there\
  \ are increasing opportunities for specialisation, research, and teaching, allowing\
  \ professionals to make a significant difference in patient care."
multiple_choice:
- question_num: 1
  text: What is the primary focus of genomics?
  A: The study of patient psychology
  B: The study of genes and how alterations affect protein function
  C: The study of hospital management systems
  D: The study of nursing techniques
  answer: B
  points: 1
  explanation: The text defines genomics as the study of genes and how alterations
    can lead to changes in how proteins function or are produced.
- question_num: 2
  text: Which professional works directly with patients to provide genetic information
    and support?
  A: Clinical scientist
  B: Genomic counsellor
  C: Bioinformatics specialist
  D: Hospital administrator
  answer: B
  points: 1
  explanation: Genomic counsellors work directly with patients and their families
    to provide genetic information and support.
- question_num: 3
  text: What is the typical starting band for a Healthcare science practitioner?
  A: Band 2
  B: Band 4
  C: Band 5
  D: Band 7
  answer: C
  points: 1
  explanation: The text states that a Healthcare science practitioner would usually
    start on band 5.
- question_num: 4
  text: Which of the following is a key activity for a genomic counsellor?
  A: Performing surgery on newborns
  B: Ordering and interpreting genetic tests
  C: Managing hospital finances
  D: Cleaning laboratory equipment
  answer: B
  points: 1
  explanation: Ordering and interpreting genetic and genomic tests is listed as a
    typical activity for a genomic counsellor.
- question_num: 5
  text: What is the primary hereditary material in humans?
  A: Proteins
  B: RNA
  C: DNA
  D: Cells
  answer: C
  points: 1
  explanation: The text identifies DNA as the hereditary material in humans and almost
    all other organisms.
- question_num: 6
  text: What is the required degree classification for the Scientist Training Programme
    (STP)?
  A: 3rd class degree
  B: Pass degree
  C: 1st or 2:1 in a relevant degree
  D: Any degree regardless of grade
  answer: C
  points: 1
  explanation: To start the Scientist Training Programme, you need a 1st or 2:1 in
    a relevant first degree.
- question_num: 7
  text: Which of these is NOT a benefit of working in the NHS mentioned in the text?
  A: Excellent pension scheme
  B: Guaranteed promotion every year
  C: Flexible and part-time working
  D: Good holiday entitlement
  answer: B
  points: 1
  explanation: The text does not mention guaranteed annual promotion; it mentions
    progression through pay bands based on years of service.
- question_num: 8
  text: What is the standard number of hours per week for NHS staff?
  A: 35 hours
  B: 37.5 hours
  C: 40 hours
  D: 42 hours
  answer: B
  points: 1
  explanation: NHS staff will usually work a standard 37.5 hours per week.
- question_num: 9
  text: What is the role of a clinical scientist in genomics regarding patient contact?
  A: They see patients every day
  B: They rarely have direct patient contact
  C: They only see patients in surgery
  D: They are the primary point of contact for families
  answer: B
  points: 1
  explanation: The text states that as a healthcare scientist working in genomics,
    you’d rarely have direct patient contact yourself.
- question_num: 10
  text: Which of these is a category of work for a healthcare scientist in genomics?
  A: Prenatal diagnosis
  B: Hospital catering
  C: Patient transport
  D: Building maintenance
  answer: A
  points: 1
  explanation: Prenatal diagnosis is one of the three main categories of work for
    a healthcare scientist in genomics.
- question_num: 11
  text: What is the name of the pay system for most NHS staff?
  A: National Salary Scale
  B: Agenda for Change
  C: Healthcare Pay Framework
  D: Clinical Wage Structure
  answer: B
  points: 1
  explanation: Most jobs in the NHS are covered by the Agenda for Change (AfC) pay
    scales.
- question_num: 12
  text: Which of these is a required skill for a genomic counsellor?
  A: Ability to perform complex surgery
  B: Emotional resilience and a calm temperament
  C: Expertise in hospital accounting
  D: Ability to work only in isolation
  answer: B
  points: 1
  explanation: Emotional resilience and a calm temperament are listed as must-have
    skills for genomic counsellors.
- question_num: 13
  text: What is the purpose of the Human Genome Project?
  A: To build new hospitals
  B: To increase NHS staff salaries
  C: To gain a better understanding of how traits are passed from parents to children
  D: To train new nurses
  answer: C
  points: 1
  explanation: The project aims to gain a better understanding of how certain traits
    and characteristics are passed on from parents to children.
- question_num: 14
  text: What qualification is needed to start a level 4 apprenticeship in healthcare
    science?
  A: A PhD
  B: 5 GCSEs at 9-4/A-C or Level 2 Diploma
  C: A Master's degree
  D: No qualifications required
  answer: B
  points: 1
  explanation: To start a level 4 apprenticeship, you need 5 GCSEs at 9-4/A-C or a
    Level 2 Diploma in Healthcare Science.
- question_num: 15
  text: What is the typical pay band for a Consultant clinical scientist?
  A: B2/3
  B: B5
  C: B6/7
  D: B8c/B8d
  answer: D
  points: 1
  explanation: The text lists Consultant clinical scientist as being on pay bands
    B8c/B8d.
