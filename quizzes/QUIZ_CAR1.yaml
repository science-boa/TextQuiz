  A: A 3rd class degree
  B: A 1st or 2:1 in a relevant degree
  C: Any degree with a 2:2
  D: A master's degree in any subject
  answer: B
  points: 1
  explanation: To start the Scientist Training Programme, you need a 1st or 2:1 in
