- question_num: 11
  text: What is the role of a genomic counsellor regarding test results?
  A: They ignore them
  B: They translate them for patients and non-genetic health professionals
  C: They only show them to doctors
  D: They destroy them after reading
  answer: B
  points: 1
  explanation: Typical activities include translating test results for patients and
    non-genetic health professionals.
