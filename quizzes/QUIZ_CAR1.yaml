- question_num: 7
  text: What is the standard number of hours per week for NHS staff?
  A: 35 hours
  B: 37.5 hours
  C: 40 hours
  D: 48 hours
  answer: B
  points: 1
  explanation: NHS staff will usually work a standard 37.5 hours per week.
- question_num: 8
  text: What is the primary hereditary material in humans?
  A: Proteins
  B: RNA
  C: DNA
  D: Cells
  answer: C
  points: 1
  explanation: DNA is the hereditary material in humans and almost all other organisms.
- question_num: 9
  text: Which of the following is NOT a benefit of working in the NHS mentioned in
    the text?
  A: Excellent pension scheme
  B: Guaranteed promotion every year
  C: Flexible and part-time working
  D: NHS discounts in shops and restaurants
  answer: B
  points: 1
  explanation: The text does not state that promotion is guaranteed every year; it
    mentions progression through pay bands.
