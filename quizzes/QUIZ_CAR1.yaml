  points: 1
  explanation: Must-have skills include emotional resilience, a calm temperament and
    the ability to work well under pressure.
- question_num: 14
  text: What is the purpose of the Human Genome Project?
  A: To build new hospitals
  B: To gain a better understanding of how traits are passed from parents to children
  C: To increase the number of nurses in the NHS
  D: To reduce the cost of medical equipment
  answer: B
  points: 1
  explanation: The Human Genome Project aims to gain a better understanding of how
    certain traits and characteristics are passed on from parents to children.
