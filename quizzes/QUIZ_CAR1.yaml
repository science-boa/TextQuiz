title: Introduction to Careers in Genomics and Genomic Counselling
resource_text: "### Careers in Genomics and Genomic Counselling\n\nGenomics is the\
  \ study of genes and how alterations in them can lead to changes in how proteins\
  \ are produced or function within cells. Genes act as instructions that tell the\
  \ body how to make the proteins necessary for survival and growth. DNA (deoxyribonucleic\
  \ acid) is the hereditary material found in nearly every cell of the human body.\
  \ Healthcare scientists in genomics examine samples of nucleic acid (DNA or RNA)\
  \ to identify alterations responsible for inherited or acquired diseases, such as\
  \ cancer or cystic fibrosis.\n\n#### The Role of a Genomic Counsellor\nGenomic counsellors,\
  \ also known as genetic counsellors, are highly skilled professionals who combine\
  \ specific training in genetics with excellent communication and counselling skills.\
  \ They work directly with patients and their families to provide support and information,\
  \ helping them adapt to genetic conditions. Their daily activities include recording\
  \ medical histories, ordering and interpreting genetic tests, and assessing the\
  \ risk of inheriting or passing on conditions. They also translate complex test\
  \ results for patients and other healthcare professionals, and provide emotional\
  \ support to families facing life-changing news.\n\n#### The Role of a Healthcare\
  \ Scientist in Genomics\nUnlike genomic counsellors, healthcare scientists in genomics\
  \ rarely have direct patient contact. Their work focuses on the chemical examination\
  \ of cellular DNA to define abnormalities. Their work generally falls into three\
  \ categories: prenatal diagnosis (examining foetal cells), carrier testing and risk\
  \ assessment for single gene disorders, and confirming diagnoses for inherited or\
  \ acquired conditions. They work within multidisciplinary teams that include doctors,\
  \ bioinformatics specialists, nurses, and genomic counsellors.\n\n#### Career Progression\
  \ and Pay\nMost NHS roles are covered by the 'Agenda for Change' (AfC) pay system,\
  \ which consists of nine pay bands. \n- **Healthcare science assistants** typically\
  \ start at bands 2 or 3.\n- **Healthcare science associates** are at band 4.\n-\
  \ **Healthcare science practitioners** usually start at band 5.\n- **Clinical scientists**\
  \ generally enter at band 6 or 7 and can progress to band 8a.\n- **Consultant clinical\
  \ scientists** operate at bands 8c or 8d.\n\nSalaries vary significantly based on\
  \ the specific role and location. For example, a Clinical Genomics Consultant role\
  \ may offer between £94,356 and £150,569, while a Band 5 Counsellor position might\
  \ be listed at £31,049. Other roles, such as a Specialist Counsellor, may range\
  \ from £39,959 to £48,117.\n\n#### Entry Requirements\nThere are multiple pathways\
  \ into these careers:\n1. **Apprenticeships:** Entry-level or level 2 apprenticeships\
  \ require GCSEs (9-4/A-C) in maths, English, and science. Level 4 apprenticeships\
  \ require a Level 2 Diploma in Healthcare Science or equivalent GCSEs. Level 6 apprenticeships\
  \ require level 3 qualifications, such as A-levels (including one science).\n2.\
  \ **Scientist Training Programme (STP):** To become a clinical scientist, you generally\
  \ need a 1st or 2:1 in a relevant degree, or a 2:2 with a relevant higher degree.\
  \ \n3. **Genomic Counselling:** This requires completing the NHS Scientist Training\
  \ Programme. Those with degrees in psychology, nursing, or midwifery may qualify\
  \ by completing a short course in genetics.\n\n#### Skills and Benefits\nSuccess\
  \ in these fields requires excellent communication, emotional resilience, problem-solving,\
  \ and the ability to work in multidisciplinary teams. Benefits of working in the\
  \ NHS include flexible working, high income potential early in a career, an excellent\
  \ pension scheme, good holiday entitlement, and various staff discounts. As you\
  \ gain experience, you can pursue further specialisation, management, research,\
  \ or teaching roles. The field is expanding, with opportunities like the Human Genome\
  \ Project allowing scientists to better understand how traits are passed from parents\
  \ to children."
multiple_choice:
- question_num: 1
  text: What is the primary focus of genomics?
  A: The study of human behaviour
  B: The study of genes and how alterations affect protein production
  C: The study of surgical techniques
  D: The study of hospital management
  answer: B
  points: 1
  explanation: Genomics is defined as the study of genes and how alterations can lead
    to changes in how proteins function or are produced by cells.
- question_num: 2
  text: Which professional works directly with patients to help them adapt to genetic
    diseases?
  A: Bioinformatics scientist
  B: Genomic counsellor
  C: Laboratory technician
  D: Hospital administrator
  answer: B
  points: 1
  explanation: Genomic counsellors work directly with patients and their families
    to provide genetic information and support.
- question_num: 3
  text: What is the typical starting band for a healthcare science practitioner?
  A: Band 2
  B: Band 4
  C: Band 5
  D: Band 8a
  answer: C
  points: 1
  explanation: Healthcare science practitioners usually start on band 5.
- question_num: 4
  text: What is the minimum GCSE requirement for an entry-level apprenticeship?
  A: GCSEs 9-4/A-C in maths, English and a science
  B: GCSEs 9-7 in all subjects
  C: No GCSEs required
  D: GCSEs in history and geography
  answer: A
  points: 1
  explanation: Entry-level jobs/level 2 apprenticeships typically require GCSEs 9-4/A-C
    in maths, English and a science.
- question_num: 5
  text: Which of these is a category of work for a healthcare scientist in genomics?
  A: Surgical intervention
  B: Prenatal diagnosis
  C: Patient counselling
  D: Hospital catering
  answer: B
  points: 1
  explanation: The work of a healthcare scientist in genomics revolves around three
    categories, one of which is prenatal diagnosis.
