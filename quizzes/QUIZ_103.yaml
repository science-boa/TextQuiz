title: 'Educational Assessment: The Life and Career of Sam Neill'
resource_text: '### The Life and Career of Sam Neill


  Sir Nigel John Dermot "Sam" Neill (1947–2026) was a highly accomplished New Zealand
  actor and businessman. Born in Omagh, Northern Ireland, to an English mother and
  a New Zealand father, Neill moved to New Zealand with his family in 1954. He held
  citizenship in New Zealand, Ireland, and the United Kingdom. During his childhood,
  Neill struggled with a stammer, which influenced his social interactions, and he
  adopted the name "Sam" while at school to distinguish himself from other boys named
  Nigel.


  Neill’s acting career spanned over five decades, beginning in the early 1970s. After
  attending the University of Canterbury and Victoria University of Wellington, he
  gained professional experience in theatre before transitioning to film. His breakthrough
  performance came in the 1977 New Zealand film *Sleeping Dogs*, which was the first
  local film to be widely screened internationally. Throughout his career, Neill became
  known for his versatility, playing both heroic and villainous roles in a wide range
  of genres, including thrillers, dramas, and science fiction.


  He achieved international prominence for his role as the palaeontologist Dr. Alan
  Grant in Steven Spielberg’s 1993 blockbuster *Jurassic Park*, a character he reprised
  in *Jurassic Park III* (2001) and *Jurassic World Dominion* (2022). His other notable
  film credits include *Dead Calm* (1989), *The Hunt for Red October* (1990), *The
  Piano* (1993), *Event Horizon* (1997), and *Hunt for the Wilderpeople* (2016). On
  television, he was widely recognized for his portrayal of the title character in
  the miniseries *Merlin* (1998) and as the ruthless Major Chester Campbell in the
  BBC series *Peaky Blinders*.


  Beyond acting, Neill was a businessman who owned a winery called Two Paddocks in
  the Central Otago region of New Zealand. He was also an author, publishing his memoir,
  *Did I Ever Tell You This?*, in 2023. Throughout his life, Neill was active in various
  causes, including environmental advocacy in New Zealand. In 1991, he was appointed
  an Officer of the Order of the British Empire for his services as an actor. He passed
  away in 2026 at the age of 78.'
