title: Exploring Careers in Cardiac Science and Clinical Exercise Physiology
resource_text: "### Careers in Cardiac Science and Clinical Exercise Physiology\n\n\
  Healthcare science is a vital part of the NHS, offering diverse career paths for\
  \ those interested in patient care, technology, and diagnostics. Two significant\
  \ areas within this field are Cardiac Sciences and Clinical Exercise Physiology.\n\
  \n#### Cardiac Sciences\nHealthcare scientists in cardiac science are responsible\
  \ for diagnosing, monitoring, and conducting analytical procedures for patients\
  \ with heart disease. This is a patient-facing role that involves working with individuals\
  \ of all ages, from infants to the elderly. \n\nKey procedures performed in cardiac\
  \ science include:\n- **Echocardiography:** Using ultrasound to visualize the heart's\
  \ structure and function.\n- **Pacemaker Implantation and Follow-up:** Programming\
  \ and monitoring devices to ensure they function correctly.\n- **Exercise Stress\
  \ Testing:** Monitoring patients, often on a treadmill, to assess blood vessel function.\n\
  \nRoles range from Healthcare Science Assistants (Bands 2/3) who perform routine\
  \ tests like ECGs, to Practitioners (Band 5) who provide technical support and reports,\
  \ and Clinical Scientists (Bands 6-8a) who handle complex diagnostics and team management.\
  \ Consultant Clinical Scientists can reach bands 8a-9.\n\n#### Clinical Exercise\
  \ Physiology\nClinical exercise physiologists prescribe and deliver evidence-based\
  \ exercise programmes to help patients manage long-term conditions. They work in\
  \ diverse settings, including cardiology, oncology, respiratory care, and mental\
  \ health. Their tasks include cardiopulmonary exercise testing, muscular strength\
  \ assessment, and providing advice on lifestyle changes to improve well-being.\n\
  \nTo become a clinical exercise physiologist, you typically need a first degree\
  \ in a relevant subject followed by a one-year Master’s degree in clinical exercise\
  \ physiology. Registered professionals usually start at Band 6, with opportunities\
  \ for progression.\n\n#### Pay and Benefits\nNHS staff are employed under the 'Agenda\
  \ for Change' (AfC) system. As of April 2026, pay varies by band and experience:\n\
  - **Band 2:** £25,272\n- **Band 4:** £28,392 to £31,157\n- **Band 5:** £32,073 to\
  \ £39,043\n- **Band 6:** £39,959 to £48,117\n- **Band 7:** £49,387 to £56,515\n\
  - **Band 8a:** £57,528 to £64,750\n\nBeyond salary, the NHS offers excellent benefits,\
  \ including a pension scheme, flexible working, and high-income potential early\
  \ in a career.\n\n#### Entry Requirements and Skills\nEntry routes are flexible.\
  \ For apprenticeships, you generally need GCSEs (grades 9-4/A-C) in maths, English,\
  \ and science. Higher-level roles require A-levels or relevant degrees. Essential\
  \ skills for these roles include:\n- Excellent communication and interpersonal skills.\n\
  - Emotional resilience and a calm temperament.\n- Strong problem-solving and diagnostic\
  \ abilities.\n- Teamwork and leadership capacity.\n\nBoth fields are evolving, offering\
  \ significant opportunities for research, teaching, and management. Whether you\
  \ choose to specialize in cardiac diagnostics or exercise-based therapy, you will\
  \ be at the forefront of patient care, utilizing modern technology to make a tangible\
  \ difference in people's lives."
