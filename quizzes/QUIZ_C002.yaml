  text: What is the primary purpose of echocardiography?
  A: To measure blood pressure
  B: To use ultrasound to obtain pictures of the heart
  C: To perform a six-minute walk test
  D: To provide mental health support
  answer: B
  points: 1
  explanation: The text states echocardiography uses ultrasound to obtain pictures
    of the heart to help diagnose and monitor diseases.
