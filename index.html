<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOA Science Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .markdown-content h1 { font-size: 1.5rem; font-weight: 800; margin-top: 1.5rem; margin-bottom: 0.75rem; color: #1e1b4b; }
        .markdown-content h2 { font-size: 1.25rem; font-weight: 700; margin-top: 1.25rem; margin-bottom: 0.5rem; color: #1e1b4b; }
        .markdown-content h3 { font-size: 1.125rem; font-weight: 600; margin-top: 1rem; margin-bottom: 0.5rem; color: #1e1b4b; }
        .markdown-content p { margin-bottom: 1rem; line-height: 1.625; }
        .markdown-content ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
        .markdown-content ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 1rem; }
        .markdown-content li { margin-bottom: 0.25rem; }
        .markdown-content strong { font-weight: 700; color: #111827; }
        .markdown-content em { font-style: italic; }
        .markdown-content code { font-family: monospace; background-color: #f3f4f6; padding: 0.125rem 0.25rem; border-radius: 0.25rem; font-size: 0.875em; }
        .markdown-content pre { background-color: #f3f4f6; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin-bottom: 1rem; }
        .markdown-content blockquote { border-left: 4px solid #e5e7eb; padding-left: 1rem; color: #4b5563; font-style: italic; margin-bottom: 1rem; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans h-screen overflow-hidden">

    <div class="h-screen flex flex-col">
        <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between shrink-0">
            <h1 class="text-lg font-bold text-gray-500 tracking-wider uppercase">BOA Science Portal</h1>
            <div class="flex items-center space-x-4">
                <a href="#" onclick="toggleLayout()" class="text-indigo-600 font-semibold underline text-sm">Rotate View</a>
            </div>
        </header>

        <main id="scroll-container" class="flex-1 overflow-y-auto relative">
            <div id="loading" class="text-center py-12">
                <p class="text-xl font-semibold text-gray-600 animate-pulse">Loading Assignment...</p>
            </div>

            <div id="error-container" class="hidden p-8 max-w-2xl mx-auto my-8 bg-red-50 border border-red-200 rounded-xl text-red-800 space-y-3">
                <h2 class="text-lg font-bold">Failed to Load Quiz</h2>
                <p id="error-message" class="text-sm font-mono whitespace-pre-wrap"></p>
            </div>

            <div id="portal" class="hidden h-full flex flex-col md:flex-row">
                <div id="left-panel" class="w-full md:w-1/2 p-8 bg-gray-50 flex flex-col gap-6 shrink-0 md:h-full min-h-0">
                    <h1 id="quiz-title" class="text-3xl font-black tracking-tight text-gray-900">Quiz Portal</h1>
                    
                    <div id="resource-container" class="hidden flex-1 overflow-y-auto bg-white p-6 rounded-xl shadow-xs border border-gray-100 min-h-[300px] md:min-h-0">
                        <div id="resource-text" class="markdown-content text-gray-700 select-none"></div>
                    </div>

                    <div class="bg-white p-6 rounded-xl shadow-xs border border-gray-100 shrink-0">
                        <label class="block text-sm font-bold text-gray-700 mb-2">School Email Address</label>
                        <input type="email" id="student-email" placeholder="you@boa-academy.co.uk" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                </div>

                <div id="right-panel" class="w-full md:w-1/2 h-full overflow-y-auto p-8 bg-white border-l border-gray-100">
                    <div class="max-w-xl mx-auto space-y-8 pb-20">
                        <div id="mc-section" class="space-y-6">
                            <h2 class="text-xl font-bold border-b pb-2 text-indigo-900">Part 1: Multiple Choice</h2>
                            <div id="mc-questions" class="space-y-6"></div>
                        </div>

                        <div id="la-section" class="hidden space-y-4 pt-6 border-t border-gray-100">
                            <h2 class="text-xl font-bold text-indigo-900">Part 2: Long Answer</h2>
                            <p id="la-text" class="text-gray-700 font-medium select-all" draggable="false"></p>
                            
                            <div id="copy-paste-warning" class="hidden bg-red-50 border-l-4 border-red-500 p-3 text-red-800 text-sm font-semibold rounded-r-lg my-2 flex items-center space-x-2 transition-all duration-300">
                                <span>⚠️ Copy/Paste blocked to prevent AI abuse</span>
                            </div>

                            <textarea id="la-input" rows="5" placeholder="Type your full analysis here..." class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"></textarea>
                        </div>

                        <button id="submit-btn" onclick="submitAssignment()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg shadow-md transition">
                            Submit Assignment
                        </button>
                    </div>
                </div>
            </div>
            
            <div id="results-portal" class="hidden p-12 text-center space-y-4">
                <h2 class="text-2xl font-black text-gray-900">Assignment Submitted Successfully!</h2>
            </div>
        </main>
    </div>

    <div id="custom-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl max-w-md w-full p-6 shadow-xl space-y-4 transform scale-95 transition-all duration-200">
            <h3 id="modal-title" class="text-lg font-bold text-gray-900">Notification</h3>
            <p id="modal-message" class="text-gray-600 text-sm"></p>
            <div class="flex justify-end">
                <button onclick="closeModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-lg transition">
                    OK
                </button>
            </div>
        </div>
    </div>

    <script>
        const BACKEND_URL = "https://default4a7dcc91048348f19bae8f17879c3c.f9.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/69f994d9c442436d98293e9736d91e2f/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=JSlxpAAXM7COgS_rD1r9wXUnW-H6sfZa1aIePHekJBY"; 
        let quizData = null;
        let quizId = "101";
        let userEmail = "";
        let isStacked = false;
        let warningTimeout = null;

        // Timing metrics
        let pageOpenTime = null;
        let firstKeystrokeTime = null;
        
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('quiz')) quizId = urlParams.get('quiz').trim();
        if (urlParams.has('user')) userEmail = urlParams.get('user').trim();

        function showAlert(message, title = "System Notification") {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-message').innerText = message;
            document.getElementById('custom-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('custom-modal').classList.add('hidden');
        }

        function toggleLayout() {
            isStacked = !isStacked;
            const container = document.getElementById('portal');
            const main = document.getElementById('scroll-container');
            
            if (isStacked) {
                container.classList.remove('md:flex-row', 'h-full');
                container.classList.add('flex-col');
                main.classList.add('overflow-y-auto');
            } else {
                container.classList.add('md:flex-row', 'h-full');
                container.classList.remove('flex-col');
                main.classList.remove('overflow-y-auto');
            }
        }

        async function loadQuiz() {
            let formattedQuizId = quizId;
            if (!formattedQuizId.toLowerCase().startsWith("quiz_")) {
                formattedQuizId = "QUIZ_" + formattedQuizId;
            }

            const url = "https://raw.githubusercontent.com/science-boa/TextQuiz/main/quizzes/" + formattedQuizId + ".yaml";
            console.log("Fetching URL:", url);
            
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const text = await response.text();
                quizData = jsyaml.load(text);
                
                console.log("Quiz Data Parsed:", quizData);
                
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('portal').classList.remove('hidden');
                renderQuiz();

                if (window.innerWidth < 768) {
                    toggleLayout();
                }
            } catch (err) {
                console.error("Load Error:", err);
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('error-message').innerText = err.message;
                document.getElementById('error-container').classList.remove('hidden');
            }
        }

        function renderQuiz() {
            document.getElementById('quiz-title').innerText = quizData.title || "Quiz Portal";
            
            // Populate email input with student email parameter
            if (userEmail) {
                document.getElementById('student-email').value = userEmail;
            }

            // Resource render logic
            if (quizData.resource_text) {
                console.log("Rendering resource_text...");
                try {
                    let htmlOutput = "";
                    
                    // Conditionally prepend floated image if image_url exists
                    if (quizData.image_url) {
                        htmlOutput += `
                            <img src="${quizData.image_url}" 
                                 alt="Resource Image" 
                                 class="float-right w-1/2 ml-6 mb-4 rounded-xl border border-gray-100 shadow-sm object-cover" 
                                 onerror="this.style.display='none';" />`;
                    }

                    if (window.marked && typeof window.marked.parse === 'function') {
                        htmlOutput += window.marked.parse(quizData.resource_text);
                    } else if (window.marked) {
                        htmlOutput += window.marked(quizData.resource_text);
                    } else {
                        htmlOutput += quizData.resource_text.replace(/\n/g, "<br>");
                    }
                    document.getElementById('resource-text').innerHTML = htmlOutput;
                    document.getElementById('resource-container').classList.remove('hidden');
                } catch (e) {
                    console.error("Markdown rendering error:", e);
                    document.getElementById('resource-text').innerHTML = "Error rendering markdown.";
                }
            } else {
                console.warn("resource_text field not found in quizData.");
                document.getElementById('resource-text').innerHTML = "<p class='text-gray-500'>No resource text provided.</p>";
                document.getElementById('resource-container').classList.remove('hidden');
            }

            // Part 1: Multiple Choice Question render logic
            const mcContainer = document.getElementById('mc-questions');
            mcContainer.innerHTML = "";
            quizData.multiple_choice?.forEach(q => {
                const qDiv = document.createElement('div');
                qDiv.className = "space-y-3";
                const labelContent = ['A', 'B', 'C', 'D'].map(l => `<label class="flex items-center space-x-3 p-3 border border-gray-200 rounded-lg cursor-pointer hover:bg-gray-50"><input type="radio" name="mc_${q.question_num}" value="${l}"> <span>${l}: ${q[l] || ""}</span></label>`).join('');
                qDiv.innerHTML = `<p class="font-semibold">${q.question_num}. ${q.text}</p>${labelContent}`;
                mcContainer.appendChild(qDiv);
            });
            
            // Part 2: Long Answer conditional rendering logic
            const laSection = document.getElementById('la-section');
            if (quizData.long_answer && quizData.long_answer.text) {
                document.getElementById('la-text').innerText = quizData.long_answer.text;
                laSection.classList.remove('hidden');
            } else {
                laSection.classList.add('hidden');
            }
        }

        // Show the security warning banner and automatically hide it after a few seconds
        function triggerAbuseWarning() {
            const banner = document.getElementById('copy-paste-warning');
            banner.classList.remove('hidden');
            
            clearTimeout(warningTimeout);
            warningTimeout = setTimeout(() => {
                banner.classList.add('hidden');
            }, 4000);
        }

        async function submitAssignment() {
            const btn = document.getElementById('submit-btn');
            const email = document.getElementById('student-email').value.trim();

            if (!email || !email.includes('@')) {
                showAlert("Please enter a valid school email address.");
                return;
            }

            const mc_answers = {};
            let allAnswered = true;
            
            quizData.multiple_choice?.forEach(q => {
                const selected = document.querySelector(`input[name="mc_${q.question_num}"]:checked`);
                if (!selected) {
                    allAnswered = false;
                } else {
                    const selectedLetter = selected.value;
                    // Resolves q[selectedLetter] to transmit the actual text of the answer option instead of the label letter
                    mc_answers[q.question_num] = {
                        answer: q[selectedLetter],
                        explanation: q.explanation || null
                    };
                }
            });

            if (!allAnswered) {
                showAlert("Please answer all multiple-choice questions.");
                return;
            }

            const laSection = document.getElementById('la-section');
            const isLongAnswerVisible = !laSection.classList.contains('hidden');
            const longAnswerVal = document.getElementById('la-input').value.trim();

            if (isLongAnswerVisible && !longAnswerVal) {
                showAlert("Please provide a response for the long answer question.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Submitting... 0s";
            
            let seconds = 0;
            const timer = setInterval(() => {
                seconds++;
                btn.innerText = "Submitting... " + seconds + "s";
            }, 1000);

            // Calculate timing metrics
            const submitTime = Date.now();
            const totalSecs = (submitTime - pageOpenTime) / 1000;
            const total_time = parseFloat(totalSecs.toFixed(1));

            let long_answer_time = null;
            if (isLongAnswerVisible && firstKeystrokeTime) {
                const laSecs = (submitTime - firstKeystrokeTime) / 1000;
                long_answer_time = parseFloat(laSecs.toFixed(1));
            }

            const payload = {
                quiz_id: quizId,
                student_email: email,
                mc_answers: mc_answers, 
                la_input: isLongAnswerVisible ? document.getElementById('la-input').value : "",
                quiz_schema: quizData,
                KEY: 29031977,
                total_time: total_time,
                long_answer_time: long_answer_time
            };

            try {
                const response = await fetch(BACKEND_URL, {
                    method: 'POST', 
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'omit', // Strips school single sign-on cookies that cause gateway authentication errors
                    mode: 'cors',
                    body: JSON.stringify(payload)
                });
                
                clearInterval(timer);
                
                if (response.ok) {
                    document.getElementById('portal').classList.add('hidden');
                    document.getElementById('results-portal').classList.remove('hidden');
                } else {
                    const errorText = await response.text();
                    showAlert("Submission failed: " + errorText, "Error");
                    btn.disabled = false;
                    btn.innerText = "Submit Assignment";
                }
            } catch (err) { 
                clearInterval(timer);
                showAlert("Network error. Please check your connection.", "Error"); 
                btn.disabled = false;
                btn.innerText = "Submit Assignment";
            }
        }

        window.onload = () => { 
            // Capture initial load time
            pageOpenTime = Date.now();

            loadQuiz(); 

            // Copy and Paste abuse prevention handlers
            const laText = document.getElementById('la-text');
            const laInput = document.getElementById('la-input');

            laText.addEventListener('copy', (e) => {
                e.preventDefault();
                triggerAbuseWarning();
            });

            laInput.addEventListener('paste', (e) => {
                e.preventDefault();
                triggerAbuseWarning();
            });

            // Prevent dragging from the question text
            laText.addEventListener('dragstart', (e) => {
                e.preventDefault();
            });

            // Prevent dropping into the long-answer input field
            laInput.addEventListener('drop', (e) => {
                e.preventDefault();
                triggerAbuseWarning();
            });

            // Robust keystroke registration
            const recordFirstKeystroke = () => {
                if (!firstKeystrokeTime) {
                    firstKeystrokeTime = Date.now();
                }
            };

            // Bind to multiple events for maximum compatibility across devices, platforms and auto-fills
            laInput.addEventListener('keydown', recordFirstKeystroke);
            laInput.addEventListener('input', recordFirstKeystroke);
            laInput.addEventListener('keyup', recordFirstKeystroke);
            laInput.addEventListener('change', recordFirstKeystroke);
        };
    </script>
</body>
</html>
